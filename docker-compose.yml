services:
  web:
    build:
      context: .
      target: development # Aponta para o estágio de dev do Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app # Código local sincronizado com o container
      - django_media:/app/media
      - django_static:/app/static
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=sua-chave-de-dev-aqui

volumes:
  django_media:
  django_static: