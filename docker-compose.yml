services:
  web:
    build: .
    # O comando agora aplica migrations E junta os estáticos ao iniciar
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - django_media:/app/media
      - django_static:/app/static
      - django_db:/app/db_data
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1

volumes:
  django_media:
  django_static:
  django_db: