{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-slate-200">
    <h2 class="text-2xl font-bold mb-6 text-slate-800">Registrar Nova Obra</h2>
    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Descrição da Obra</label>
            {{ form.descricao }}
        </div>
        
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Tipo de Resíduo</label>
            {{ form.tipo_residuo }}
        </div>

        <div class="border-t border-slate-100 pt-6">
            <h3 class="text-lg font-bold text-slate-800 mb-4">Localização da Caçamba</h3>
            
            <label class="block text-sm font-semibold text-slate-700 mb-2">Endereço Completo</label>
            <div class="flex gap-2 mb-4">
                {{ form.endereco }}
                <button type="button" onclick="buscarEndereco()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 rounded-lg transition whitespace-nowrap">
                    Buscar
                </button>
            </div>
            
            <div id="map-preview" class="w-full h-64 rounded-lg border border-slate-200 bg-slate-100 mb-4 z-0"></div>
            
            <p id="geo-status" class="text-xs text-slate-500 font-medium">O pino aparecerá no mapa acima após a busca.</p>
            
            {{ form.latitude }}
            {{ form.longitude }}
        </div>

        <div class="flex gap-4 pt-4">
            <a href="{% url 'painel' %}" class="w-1/3 text-center bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-4 rounded-lg transition">Cancelar</a>
            <button type="submit" class="w-2/3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-md">Publicar Obra</button>
        </div>
    </form>
</div>

<script>
    let map, marker;

    // Inicializa o mapa de preview
    function initPreviewMap() {
        map = L.map('map-preview').setView([-15.7938, -47.8827], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }

    function buscarEndereco() {
        const endereco = document.getElementById('id_endereco').value;
        const status = document.getElementById('geo-status');

        if (!endereco) return;

        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}`)
            .then(r => r.json())
            .then(data => {
                if (data.length > 0) {
                    const lat = data[0].lat;
                    const lon = data[0].lon;

                    // Atualiza campos escondidos
                    document.getElementById('id_latitude').value = lat;
                    document.getElementById('id_longitude').value = lon;

                    // Move o mapa e o PINO
                    map.setView([lat, lon], 16);
                    if (marker) map.removeLayer(marker);
                    marker = L.marker([lat, lon]).addTo(map);
                    
                    status.textContent = "✓ Localização confirmada no mapa!";
                    status.className = "text-xs text-emerald-600 font-bold";
                } else {
                    status.textContent = "⚠ Endereço não encontrado.";
                    status.className = "text-xs text-red-500 font-bold";
                }
            });
    }

    document.addEventListener('DOMContentLoaded', initPreviewMap);
</script>
{% endblock %}
