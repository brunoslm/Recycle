{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-slate-200 mt-8">
    <h2 class="text-2xl font-bold mb-2 text-slate-800">Enviar Proposta de Aquisição</h2>
    <p class="text-slate-600 mb-6 pb-6 border-b border-slate-100">Obra: <span class="font-semibold">{{ obra.descricao }}</span></p>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Valor da Proposta / Pagamento ao Gerador (R$)</label>
            <input type="number" step="0.01" name="valor_transporte" class="w-full p-4 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition text-xl font-bold text-slate-800" placeholder="Ex: 150.00" required>
            <p class="text-xs text-slate-500 mt-2">Informe o valor total que o seu Centro de Reciclagem pagará ao Gerador para comprar e retirar o lote de resíduos descrito.</p>
        </div>

        <div class="flex gap-4 pt-4">
            <a href="{% url 'detalhe_obra' obra.id %}" class="w-1/3 text-center bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-4 rounded-lg transition">
                Cancelar
            </a>
            <button type="submit" class="w-2/3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-md">
                Confirmar Oferta de Compra
            </button>
        </div>
    </form>
</div>
{% endblock %}
