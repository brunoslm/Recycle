{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-12 bg-white p-8 rounded-xl shadow-sm border border-slate-200">
    <h2 class="text-2xl font-bold mb-2 text-slate-800">Recuperar Senha</h2>
    <p class="text-sm text-slate-500 mb-6">Insira o e-mail cadastrado e enviaremos um link para redefinir sua senha.</p>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">E-mail</label>
            <input type="email" name="email" required class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition" placeholder="seu@email.com">
        </div>
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-md cursor-pointer">
            Enviar Link de Recuperação
        </button>
    </form>
</div>
{% endblock %}
